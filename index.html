<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Engineering Toolkit</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>⚡ Electrical Engineering Toolkit</h1>
</header>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<button onclick="show('ohm')">Ohm</button>
<button onclick="show('power')">Power</button>
<button onclick="show('energy')">Energy</button>
<button onclick="show('resistor')">Resistor</button>
<button onclick="show('ac')">AC</button>
<button onclick="show('reactance')">Reactance</button>
<button onclick="show('impedance')">Impedance</button>
</div>

<!-- Content -->
<div class="content">

<!-- OHM -->
<section id="ohm" class="card">
<h2>Ohm's Law</h2>
<input id="voltage" placeholder="Voltage (V)">
<input id="current" placeholder="Current (A)">
<button onclick="calcOhm()">Calculate</button>
<p id="ohmOut"></p>
</section>

<!-- POWER -->
<section id="power" class="card hidden">
<h2>Power</h2>
<input id="pv" placeholder="Voltage (V)">
<input id="pi" placeholder="Current (A)">
<button onclick="calcPower()">Calculate</button>
<p id="powerOut"></p>
</section>

<!-- ENERGY -->
<section id="energy" class="card hidden">
<h2>Energy</h2>
<input id="ep" placeholder="Power (W)">
<input id="et" placeholder="Time (h)">
<button onclick="calcEnergy()">Calculate</button>
<p id="energyOut"></p>
</section>

<!-- REACTANCE -->
<section id="reactance" class="card hidden">
<h2>Reactance</h2>
<input id="freq" placeholder="Frequency (Hz)">
<input id="induct" placeholder="Inductance (H)">
<input id="cap" placeholder="Capacitance (F)">
<button onclick="calcReactance()">Calculate</button>
<p id="reactOut"></p>
</section>

<!-- IMPEDANCE -->
<section id="impedance" class="card hidden">
<h2>Impedance</h2>
<input id="Rz" placeholder="Resistance (Ω)">
<input id="Xl" placeholder="XL">
<input id="Xc" placeholder="XC">
<button onclick="calcImpedance()">Calculate</button>
<p id="impOut"></p>
</section>

</div>
</div>

<!-- FOOTER -->
<footer>
<img src="https://i.ibb.co/4pDNDk1/profile.png">

<script src="app.js"></script>
</body>
</html>
